services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    environment:
      - PORT=${BACKEND_PORT:-3001}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Must be the URL the browser (not Docker) uses to reach the backend.
        # Override with: SERVER_URL=http://my-server:3002 make docker-run
        # or:            BACKEND_PORT=3002 make docker-run
        VITE_SERVER_URL: ${SERVER_URL:-http://localhost:${BACKEND_PORT:-3001}}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
