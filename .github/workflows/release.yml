name: Release — Create & Push Docker Images

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/ulrichfrank/molthar-backend
  FRONTEND_IMAGE: ghcr.io/ulrichfrank/molthar-frontend

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true

  # Build each image × platform natively (no QEMU emulation)
  build:
    needs: release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            file: Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image: backend
            file: Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: frontend
            file: Dockerfile.frontend
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image: frontend
            file: Dockerfile.frontend
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          if [ "${{ matrix.image }}" = "backend" ]; then
            echo "name=${{ env.BACKEND_IMAGE }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.FRONTEND_IMAGE }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push (${{ matrix.image }} / ${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  # Merge platform-specific images into a single multi-arch manifest
  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [backend, frontend]

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          if [ "${{ matrix.image }}" = "backend" ]; then
            echo "name=${{ env.BACKEND_IMAGE }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ env.FRONTEND_IMAGE }}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push multi-arch manifest
        run: |
          IMAGE=${{ steps.image.outputs.name }}
          VERSION=${{ github.ref_name }}
          docker buildx imagetools create \
            --tag ${IMAGE}:${VERSION} \
            --tag ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64
